<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="pencil" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="7" result="grain"/>
      <feDisplacementMap in="SourceGraphic" in2="grain" scale="1.8" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feTurbulence type="turbulence" baseFrequency="0.06" numOctaves="2" seed="42" result="boil"/>
      <feDisplacementMap in="displaced" in2="boil" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" ry="6" fill="#faf8f5"/>
  <!-- Hand-drawn S: open stroke path with pencil displacement -->
  <path
    d="M 20.5 8.5 C 18.5 6.5 13.5 5.8 11 8 C 8.2 10.5 9.5 13.5 12 15 C 14.5 16.5 19.5 17 21 19.5 C 22.8 22.5 21 26 17 27 C 13.5 27.8 10 26.5 9 24.5"
    fill="none"
    stroke="#0a0a0a"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#pencil)"
  />
</svg>
