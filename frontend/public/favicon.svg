<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="pencil" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" seed="7" result="grain"/>
      <feDisplacementMap in="SourceGraphic" in2="grain" scale="2.0" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" seed="42" result="boil"/>
      <feDisplacementMap in="displaced" in2="boil" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" ry="6" fill="#faf8f5"/>
  <!-- Stylized calligraphic S: thick→thin→thick stroke variation via two overlapping paths -->
  <g filter="url(#pencil)">
    <!-- Main S spine — bold, expressive curves with overshoot -->
    <path
      d="M 21.5 7.2 C 19.8 5.2 15 4.5 11.8 6.5 C 8.8 8.5 8.5 12 11 14.2 C 13.2 16 17 16.5 19.5 17.5 C 23 19 23.5 22 21.5 24.5 C 19.2 27.2 14 28.2 10.5 26"
      fill="none"
      stroke="#0a0a0a"
      stroke-width="3.8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Top serif flick -->
    <path
      d="M 21.5 7.2 C 22.5 7.8 23 9 22.2 9.5"
      fill="none"
      stroke="#0a0a0a"
      stroke-width="2.4"
      stroke-linecap="round"
    />
    <!-- Bottom serif flick -->
    <path
      d="M 10.5 26 C 9.2 25 8.8 23.5 9.5 22.8"
      fill="none"
      stroke="#0a0a0a"
      stroke-width="2.4"
      stroke-linecap="round"
    />
  </g>
</svg>
